services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: yii2_app
    volumes:
      - ./src:/var/www/html:rw
    networks:
      - yii2_network
    depends_on:
      - db

  web:
    image: nginx:alpine
    container_name: yii2_web
    ports:
      - "80:80"
    volumes:
      - ./src:/var/www/html:rw
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - yii2_network
    depends_on:
      - app

  db:
    image: postgres:15
    container_name: yii2_db
    environment:
      POSTGRES_DB: loans
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - ./docker/postgres/data:/var/lib/postgresql/data
    networks:
      - yii2_network

networks:
  yii2_network: